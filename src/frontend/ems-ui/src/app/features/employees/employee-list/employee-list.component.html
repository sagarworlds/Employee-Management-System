<div class="container">
  <h2>Employee List</h2>
  <table>
    <thead>
      <tr>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Email</th>
        <th>Department</th>
        <th>Designation</th>
        <th>Salary</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let emp of employees">
        <td>{{ emp.firstName }}</td>
        <td>{{ emp.lastName }}</td>
        <td>{{ emp.email }}</td>
        <td>{{ emp.departmentName }}</td>
        <td>{{ emp.designationName }}</td>
        <td>{{ emp.salary | currency }}</td>
      </tr>
    </tbody>
  </table>
</div>
